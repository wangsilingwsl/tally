services:
  web:
    build: ./packages/web
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      - server
    restart: unless-stopped

  server:
    build: ./packages/server
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      - DATABASE_URL=file:./data/tally.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
